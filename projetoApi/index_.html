<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Imagens da NASA</title>
    <link rel="stylesheet" href="style_.css">
</head>
<body>

<h2>Imagens da NASA</h2>

<form method="get">
    <input type="text" name="search" placeholder="Pesquisar ID" value="<?= isset($_GET['search']) ? htmlspecialchars($_GET['search']) : '' ?>">
    <button type="submit">Pesquisar</button>
</form>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Imagem</th>
            <th>Título</th>
            <th>Descrição</th>
            <th>Data</th>
        </tr>
    </thead>
   <tbody>
        <?php if (count($itensPagina) > 0) { ?>

            <?php foreach ($itensPagina as $item) { 
        
        
            if (isset($item['data'][0])) {
                $data = $item['data'][0];
            } else {
                $data = [];
            }

    
            if (isset($item['links'][0]['href'])) {
                $imgUrl = $item['links'][0]['href'];
            } else {
                $imgUrl = '';
            }

            if (!empty($data['date_created'])) {
                $dataFormatada = date('d/m/Y', strtotime($data['date_created']));
            } else {
                $dataFormatada = '';
            }
        ?>
    
    <tr>
        <td>
            <?php 
            if (isset($data['nasa_id'])) {
                echo htmlspecialchars($data['nasa_id']);
            } else {
                echo '';
            }
            ?>
        </td>

        <td>
            <?php if (!empty($imgUrl)) { ?>
                <a class="link-imagem" href="https://images.nasa.gov/details/<?php echo htmlspecialchars($data['nasa_id']); ?>" target="_blank">
                    <img class="imagem" src="<?php echo htmlspecialchars($imgUrl); ?>">
                </a>
            <?php } else { ?>
                Sem imagem
            <?php } ?>
        </td>

        <td>
            <?php 
            if (isset($data['title'])) {
                echo htmlspecialchars($data['title']);
            } else {
                echo '';
            }
            ?>
        </td>

        <td class="descricao">
            <?php 
            if (isset($data['description'])) {
                echo htmlspecialchars($data['description']);
            } else {
                echo '';
            }
            ?>
        </td>

        <td><?php echo $dataFormatada; ?></td>
    </tr>

    <?php } ?>

<?php } else { ?>

    <tr>
        <td colspan="5">Nenhuma imagem encontrada.</td>
    </tr>

<?php } ?>
</tbody>
</table>

<p>
    <?php
    echo "Página " . $paginaAtual . " de " . $totalPaginas;
    echo "<br>";
    echo "Exibindo " . count($itensPagina) . " de " . $totalItens;
    ?>
</p>

<div class="paginacao">
    <?php 
    if (isset($_GET['search'])) {
        $buscaParam = '&search=' . urlencode($_GET['search']);
    } else {
        $buscaParam = '';
    }
    ?>

    <?php if ($paginaAtual > 1) { ?>
        <a href="<?php echo '?page=1' . $buscaParam; ?>">Início</a>
        <a href="<?php echo '?page=' . ($paginaAtual - 1) . $buscaParam; ?>">Anterior</a>
    <?php } ?>

    <?php 
    for ($i = 1; $i <= $totalPaginas; $i++) { ?>
        <a href="<?php echo '?page=' . $i . $buscaParam; ?>">
            <?php echo $i; ?>
        </a>
    <?php } ?>

    <?php if ($paginaAtual < $totalPaginas) { ?>
        <a href="<?php echo '?page=' . ($paginaAtual + 1) . $buscaParam; ?>">Próxima</a>
        <a href="<?php echo '?page=' . $totalPaginas . $buscaParam; ?>">Última</a>
    <?php } ?>
</div>

</body>
</html>
